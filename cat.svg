<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Body -->
  <ellipse cx="100" cy="120" rx="45" ry="35" fill="#ff9a56" stroke="#000" stroke-width="2"/>
  
  <!-- Head -->
  <circle cx="100" cy="70" r="35" fill="#ff9a56" stroke="#000" stroke-width="2"/>
  
  <!-- Ears -->
  <polygon points="75,45 70,25 85,40" fill="#ff9a56" stroke="#000" stroke-width="2"/>
  <polygon points="125,45 130,25 115,40" fill="#ff9a56" stroke="#000" stroke-width="2"/>
  
  <!-- Eyes -->
  <ellipse cx="88" cy="65" rx="5" ry="8" fill="#000"/>
  <ellipse cx="112" cy="65" rx="5" ry="8" fill="#000"/>
  
  <!-- Nose -->
  <polygon points="100,75 97,80 103,80" fill="#000"/>
  
  <!-- Mouth -->
  <path d="M 100 80 Q 95 85 90 83" stroke="#000" stroke-width="1.5" fill="none"/>
  <path d="M 100 80 Q 105 85 110 83" stroke="#000" stroke-width="1.5" fill="none"/>
  
  <!-- Whiskers -->
  <line x1="60" y1="70" x2="75" y2="68" stroke="#000" stroke-width="1"/>
  <line x1="60" y1="75" x2="75" y2="75" stroke="#000" stroke-width="1"/>
  <line x1="125" y1="68" x2="140" y2="70" stroke="#000" stroke-width="1"/>
  <line x1="125" y1="75" x2="140" y2="75" stroke="#000" stroke-width="1"/>
  
  <!-- Tail -->
  <path d="M 140 130 Q 160 120 170 140" stroke="#ff9a56" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>
